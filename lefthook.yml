# Source: github.com/evilmartians/lefthook
pre-commit:
  parallel: true
  commands:
    biome:
      glob: "*.{ts,js,json,jsonc}"
      run: bunx biome check --no-errors-on-unmatched {staged_files}
    typecheck:
      glob: "*.ts"
      run: bun run typecheck
pre-push:
  commands:
    license:
      run: bun run license:check
